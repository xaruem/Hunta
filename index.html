<!DOCTYPE html>
<html lang="ru" data-theme="light" data-lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hunta — фриланс-маркетплейс</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF7F1;
    --beige:#EEDFC4;
    --ink:#14120F;
    --ink-alt:#241C13;
    --accent:#C9962E;
    --accent-deep:#9C6F1E;
    --line:rgba(20,18,15,.14);
    --line-light:rgba(250,247,241,.16);

    --bg-1:var(--paper);
    --bg-2:var(--beige);
    --bg-alt-1:var(--ink);
    --bg-alt-2:var(--ink-alt);
    --text:var(--ink);
    --text-alt:var(--paper);
    --header-bg:rgba(250,247,241,.86);
    --muted:#4a453b;
    --muted-alt:#c9c2b4;
  }
  html[data-theme="dark"]{
    --bg-1:var(--ink);
    --bg-2:var(--ink-alt);
    --bg-alt-1:var(--paper);
    --bg-alt-2:var(--beige);
    --text:var(--paper);
    --text-alt:var(--ink);
    --header-bg:rgba(20,18,15,.86);
    --muted:#c9c2b4;
    --muted-alt:#4a453b;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Space Grotesk',sans-serif;
    color:var(--text);
    background:var(--bg-1);
    animation:bgpulse 14s ease-in-out infinite alternate;
    transition:color .4s ease;
    overflow-x:hidden;
  }
  @keyframes bgpulse{0%{background-color:var(--bg-1);}100%{background-color:var(--bg-2);}}
  .dark-zone{
    background:var(--bg-alt-1);
    color:var(--text-alt);
    animation:bgpulse-alt 16s ease-in-out infinite alternate;
    transition:color .4s ease;
    border-top:1px solid var(--line-light);border-bottom:1px solid var(--line-light);
  }
  @keyframes bgpulse-alt{0%{background-color:var(--bg-alt-1);}100%{background-color:var(--bg-alt-2);}}

  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:-0.01em;line-height:1.02;}
  .mono{font-family:'Space Grotesk',sans-serif;font-weight:600;letter-spacing:.08em;text-transform:uppercase;}
  a{color:inherit;text-decoration:none;}
  img{display:block;max-width:100%;}
  .wrap{max-width:1240px;margin:0 auto;padding:0 32px;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}

  /* ---------- HEADER ---------- */
  header{position:sticky;top:0;z-index:100;background:var(--header-bg);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);transition:background .4s ease;}
  .header-inner{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;max-width:1240px;margin:0 auto;gap:20px;}
  .logo{font-weight:700;font-size:23px;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
  .logo .dot{width:9px;height:9px;background:var(--accent);border-radius:50%;display:inline-block;}
  nav.main-nav{display:flex;gap:24px;}
  nav.main-nav a{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;padding:6px 0;border-bottom:2px solid transparent;transition:border-color .2s,color .2s;}
  nav.main-nav a:hover{border-color:var(--accent);color:var(--accent-deep);}
  .header-actions{display:flex;align-items:center;gap:14px;}

  .switcher{display:flex;align-items:center;border:1px solid var(--line);border-radius:20px;padding:3px;gap:2px;}
  .switcher button{font-size:11px;font-weight:700;letter-spacing:.04em;padding:6px 10px;border-radius:16px;transition:background .2s,color .2s;color:var(--muted);}
  .switcher button.active{background:var(--accent);color:var(--paper);}

  .theme-toggle{width:34px;height:34px;border:1px solid var(--line);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:border-color .2s,transform .3s;}
  .theme-toggle:hover{border-color:var(--accent);transform:rotate(20deg);}
  .theme-toggle svg{width:16px;height:16px;stroke:var(--text);}
  html[data-theme="dark"] .icon-sun{display:none;}
  html:not([data-theme="dark"]) .icon-moon{display:none;}

  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:3px;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.03em;transition:transform .2s, box-shadow .2s, background .2s, color .2s;}
  .btn-primary{background:var(--accent);color:var(--paper);}
  .btn-primary:hover{background:var(--accent-deep);transform:translateY(-2px);box-shadow:0 10px 22px rgba(201,150,46,.32);}
  .btn-outline{border:1.5px solid var(--text);color:var(--text);padding:10.5px 22px;}
  .btn-outline:hover{background:var(--text);color:var(--bg-1);}
  .link-quiet{font-size:13px;font-weight:600;text-transform:uppercase;}

  /* ---------- RIBBON ---------- */
  .ribbon{background:repeating-linear-gradient(135deg,var(--accent),var(--accent) 22px,var(--ink) 22px,var(--ink) 44px);transform:rotate(-1.2deg);margin:-14px -40px 0;overflow:hidden;position:relative;z-index:5;}
  .ribbon-track{display:flex;white-space:nowrap;animation:scrollLtr 26s linear infinite;}
  @keyframes scrollLtr{from{transform:translateX(-50%);}to{transform:translateX(0%);}}
  .ribbon-track span{font-weight:700;color:var(--paper);font-size:13px;padding:10px 28px;text-transform:uppercase;letter-spacing:.08em;display:inline-flex;align-items:center;gap:28px;}
  .ribbon-track span::after{content:"◆";color:var(--paper);opacity:.6;}

  /* ---------- HERO ---------- */
  .hero{padding:88px 0 66px;position:relative;}
  .hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:56px;align-items:center;}
  .eyebrow{font-size:12.5px;font-weight:700;color:var(--accent-deep);text-transform:uppercase;letter-spacing:.14em;margin-bottom:18px;display:flex;align-items:center;gap:10px;}
  .eyebrow::before{content:"";width:26px;height:2px;background:var(--accent);}
  .hero h1{font-size:clamp(38px,5.2vw,64px);margin-bottom:22px;}
  .hero h1 em{font-style:normal;color:var(--accent);}
  .hero p.lead{font-size:17.5px;line-height:1.55;max-width:460px;color:var(--muted);margin-bottom:32px;font-weight:400;text-transform:none;}
  .hero-cta{display:flex;gap:16px;align-items:center;flex-wrap:wrap;}
  .hero-visual{position:relative;}
  .hero-visual .frame{position:relative;border-radius:6px;overflow:hidden;aspect-ratio:4/5;border:1px solid var(--line);transform:rotate(1.4deg);box-shadow:0 24px 50px rgba(20,18,15,.16);}
  .hero-visual .frame img{width:100%;height:100%;object-fit:cover;animation:kenburns 18s ease-in-out infinite alternate;}
  @keyframes kenburns{0%{transform:scale(1) translate(0,0);}100%{transform:scale(1.12) translate(-2%,-2%);}}
  .hero-visual .tag{position:absolute;bottom:-18px;left:-18px;background:var(--ink);color:var(--paper);padding:16px 20px;border-radius:3px;font-size:12.5px;box-shadow:0 14px 30px rgba(0,0,0,.22);transform:rotate(-1.5deg);}
  .hero-visual .tag b{display:block;font-weight:700;font-size:22px;color:var(--accent);}
  .hero-visual .scope{position:absolute;top:-16px;right:8px;width:60px;height:60px;border:2px solid var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;animation:spin 12s linear infinite;background:var(--paper);}
  .hero-visual .scope::before,.hero-visual .scope::after{content:"";position:absolute;background:var(--accent);}
  .hero-visual .scope::before{width:2px;height:18px;}
  .hero-visual .scope::after{width:18px;height:2px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ---------- STATS ---------- */
  .stats{padding:48px 0;}
  .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;text-align:center;}
  .stats-grid .num{font-weight:700;font-size:38px;color:var(--accent);}
  .stats-grid .label{font-size:13px;text-transform:uppercase;letter-spacing:.03em;font-weight:600;margin-top:6px;color:var(--muted-alt);}

  /* ---------- SECTIONS ---------- */
  .section{padding:92px 0;}
  .section-head{max-width:640px;margin:0 auto 50px;text-align:center;}
  .section-head .eyebrow{justify-content:center;}
  .section-head h2{font-size:clamp(27px,3.4vw,40px);}
  .section-head p{margin-top:14px;font-size:15.5px;color:var(--muted);text-transform:none;font-weight:400;}

  .grid-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  .fcard{position:relative;aspect-ratio:1/1.05;border-radius:4px;overflow:hidden;border:1px solid var(--line);}
  .fcard img{width:100%;height:100%;object-fit:cover;filter:grayscale(35%);transition:filter .35s,transform .5s;}
  .fcard:hover img{filter:grayscale(0%);transform:scale(1.06);}
  .fcard .overlay{position:absolute;left:0;right:0;bottom:0;padding:16px;background:linear-gradient(0deg,rgba(20,18,15,.9),transparent 75%);color:var(--paper);}
  .fcard .overlay .role{font-weight:700;font-size:15px;text-transform:uppercase;}
  .fcard .overlay .who{font-size:11px;opacity:.75;letter-spacing:.06em;}
  .fcard.cta-card{background:var(--ink);color:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:20px;}
  .fcard.cta-card h3{font-size:17px;}

  .steps-block{margin-bottom:60px;}
  .steps-block:last-child{margin-bottom:0;}
  .steps-block .kicker{display:flex;align-items:baseline;gap:14px;margin-bottom:28px;}
  .steps-block .kicker h3{font-size:22px;}
  .steps-block .kicker span{color:var(--accent);font-size:12.5px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;}
  .steps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
  .step{border-top:3px solid var(--accent);padding-top:18px;}
  .step .idx{font-size:12.5px;color:var(--accent);font-weight:700;letter-spacing:.06em;}
  .step h4{font-weight:700;font-size:16px;text-transform:uppercase;margin:8px 0 10px;}
  .step p{font-size:14px;line-height:1.55;color:var(--muted-alt);text-transform:none;font-weight:400;}

  .testi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
  .testi{display:grid;grid-template-columns:104px 1fr;border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:4px;overflow:hidden;background:var(--bg-1);}
  .testi img{width:100%;height:100%;object-fit:cover;filter:grayscale(20%);}
  .testi .body{padding:18px 20px;display:flex;flex-direction:column;justify-content:center;}
  .testi p{font-size:13.5px;line-height:1.55;margin-bottom:10px;font-weight:400;text-transform:none;color:var(--text);}
  .testi .who{font-size:11.5px;color:var(--accent-deep);font-weight:700;letter-spacing:.04em;text-transform:uppercase;}

  .faq{max-width:820px;margin:0 auto;}
  .faq-item{border-bottom:1px solid var(--line-light);}
  .faq-q{width:100%;text-align:left;padding:20px 4px;display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:15px;color:var(--text-alt);}
  .faq-q .plus{color:var(--accent);font-size:20px;font-weight:700;transition:transform .3s;}
  .faq-item.open .plus{transform:rotate(45deg);}
  .faq-a{max-height:0;overflow:hidden;transition:max-height .35s ease;font-size:14px;color:var(--muted);line-height:1.6;font-weight:400;}
  .faq-a p{padding:0 4px 20px;}

  .final-cta{text-align:center;}
  .final-cta h2{font-size:clamp(28px,4vw,46px);margin-bottom:26px;}

  footer{padding:56px 0 32px;}
  .footer-top{display:grid;grid-template-columns:1.3fr repeat(4,1fr);gap:32px;margin-bottom:40px;}
  .footer-top .logo{color:var(--text-alt);margin-bottom:14px;}
  .footer-top p{font-size:13px;color:var(--muted);max-width:240px;line-height:1.55;font-weight:400;text-transform:none;}
  .footer-col h5{font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:14px;font-weight:700;}
  .footer-col a{display:block;font-size:13px;color:var(--muted);padding:5px 0;transition:color .2s;font-weight:400;}
  .footer-col a:hover{color:var(--accent);}
  .footer-bottom{border-top:1px solid var(--line-light);padding-top:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
  .footer-bottom .mono{font-size:11px;color:var(--muted);font-weight:500;}
  .social{display:flex;gap:10px;}
  .social a{width:34px;height:34px;border:1px solid var(--line-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text-alt);transition:background .2s,border-color .2s,color .2s;}
  .social a:hover{background:var(--accent);border-color:var(--accent);color:var(--paper);}

  @media(max-width:920px){
    nav.main-nav{display:none;}
    .hero-grid{grid-template-columns:1fr;}
    .hero-visual{order:-1;}
    .stats-grid{grid-template-columns:1fr;gap:30px;}
    .grid-cards{grid-template-columns:repeat(2,1fr);}
    .steps-grid{grid-template-columns:1fr;}
    .testi-grid{grid-template-columns:1fr;}
    .footer-top{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="#" class="logo"><span class="dot"></span>HUNTA</a>
    <nav class="main-nav">
      <a data-i18n="nav.design" href="#"></a>
      <a data-i18n="nav.dev" href="#"></a>
      <a data-i18n="nav.texts" href="#"></a>
      <a data-i18n="nav.seo" href="#"></a>
      <a data-i18n="nav.smm" href="#"></a>
      <a data-i18n="nav.media" href="#"></a>
    </nav>
    <div class="header-actions">
      <div class="switcher" id="langSwitcher">
        <button data-lang-btn="ru">RU</button>
        <button data-lang-btn="en">EN</button>
        <button data-lang-btn="uz">UZ</button>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Переключить тему">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z"/></svg>
      </button>
      <a href="#" class="link-quiet" data-i18n="header.login"></a>
      <a href="#" class="btn btn-primary" data-i18n="header.register"></a>
    </div>
  </div>
  <div class="ribbon">
    <div class="ribbon-track">
      <span data-i18n="ribbon.r1"></span><span data-i18n="ribbon.r2"></span><span data-i18n="ribbon.r3"></span>
      <span data-i18n="ribbon.r1"></span><span data-i18n="ribbon.r2"></span><span data-i18n="ribbon.r3"></span>
    </div>
  </div>
</header>

<section class="hero">
  <div class="wrap hero-grid">
    <div>
      <div class="eyebrow" data-i18n="hero.eyebrow"></div>
      <h1 data-i18n-html="hero.h1"></h1>
      <p class="lead" data-i18n="hero.lead"></p>
      <div class="hero-cta">
        <a href="#" class="btn btn-primary" data-i18n="hero.cta1"></a>
        <a href="#" class="btn btn-outline" data-i18n="hero.cta2"></a>
      </div>
    </div>
    <div class="hero-visual">
      <div class="scope"></div>
      <div class="frame">
        <img src="https://images.pexels.com/photos/3184291/pexels-photo-3184291.jpeg?auto=compress&cs=tinysrgb&w=1000" alt="Фрилансер за работой">
      </div>
      <div class="tag"><b>2 498</b><span data-i18n="hero.tagLabel"></span></div>
    </div>
  </div>
</section>

<section class="stats dark-zone">
  <div class="wrap stats-grid">
    <div><div class="num">1×/мин</div><div class="label" data-i18n="stats.l1"></div></div>
    <div><div class="num">30 000 ₽</div><div class="label" data-i18n="stats.l2"></div></div>
    <div><div class="num">2 498</div><div class="label" data-i18n="stats.l3"></div></div>
  </div>
</section>

<section class="section">
  <div class="wrap">
    <div class="section-head">
      <div class="eyebrow" data-i18n="community.eyebrow"></div>
      <h2 data-i18n="community.h2"></h2>
      <p data-i18n="community.p"></p>
    </div>
    <div class="grid-cards">
      <div class="fcard"><img src="https://images.pexels.com/photos/3861958/pexels-photo-3861958.jpeg?auto=compress&cs=tinysrgb&w=600" alt=""><div class="overlay"><div class="role" data-i18n="roles.designer"></div><div class="who">Hunta</div></div></div>
      <div class="fcard"><img src="https://images.pexels.com/photos/3182812/pexels-photo-3182812.jpeg?auto=compress&cs=tinysrgb&w=600" alt=""><div class="overlay"><div class="role" data-i18n="roles.dev"></div><div class="who">Hunta</div></div></div>
      <div class="fcard"><img src="https://images.pexels.com/photos/1181244/pexels-photo-1181244.jpeg?auto=compress&cs=tinysrgb&w=600" alt=""><div class="overlay"><div class="role" data-i18n="roles.copy"></div><div class="who">Hunta</div></div></div>
      <div class="fcard"><img src="https://images.pexels.com/photos/3861972/pexels-photo-3861972.jpeg?auto=compress&cs=tinysrgb&w=600" alt=""><div class="overlay"><div class="role" data-i18n="roles.translator"></div><div class="who">Hunta</div></div></div>
      <div class="fcard"><img src="https://images.pexels.com/photos/5905445/pexels-photo-5905445.jpeg?auto=compress&cs=tinysrgb&w=600" alt=""><div class="overlay"><div class="role" data-i18n="roles.marketer"></div><div class="who">Hunta</div></div></div>
      <div class="fcard"><img src="https://images.pexels.com/photos/3184639/pexels-photo-3184639.jpeg?auto=compress&cs=tinysrgb&w=600" alt=""><div class="overlay"><div class="role" data-i18n="roles.producer"></div><div class="who">Hunta</div></div></div>
      <div class="fcard"><img src="https://images.pexels.com/photos/4050315/pexels-photo-4050315.jpeg?auto=compress&cs=tinysrgb&w=600" alt=""><div class="overlay"><div class="role" data-i18n="roles.editor"></div><div class="who">Hunta</div></div></div>
      <div class="fcard cta-card">
        <h3 data-i18n="community.ctaTitle"></h3>
        <a href="#" class="btn btn-primary" data-i18n="hero.cta1"></a>
      </div>
    </div>
  </div>
</section>

<section class="section dark-zone">
  <div class="wrap">
    <div class="steps-block">
      <div class="kicker"><h3 data-i18n="steps.shopTitle"></h3><span data-i18n="steps.shopTag"></span></div>
      <div class="steps-grid">
        <div class="step"><div class="idx">01</div><h4 data-i18n="steps.shop1t"></h4><p data-i18n="steps.shop1p"></p></div>
        <div class="step"><div class="idx">02</div><h4 data-i18n="steps.shop2t"></h4><p data-i18n="steps.shop2p"></p></div>
        <div class="step"><div class="idx">03</div><h4 data-i18n="steps.shop3t"></h4><p data-i18n="steps.shop3p"></p></div>
      </div>
    </div>
    <div class="steps-block">
      <div class="kicker"><h3 data-i18n="steps.exTitle"></h3><span data-i18n="steps.exTag"></span></div>
      <div class="steps-grid">
        <div class="step"><div class="idx">01</div><h4 data-i18n="steps.ex1t"></h4><p data-i18n="steps.ex1p"></p></div>
        <div class="step"><div class="idx">02</div><h4 data-i18n="steps.ex2t"></h4><p data-i18n="steps.ex2p"></p></div>
        <div class="step"><div class="idx">03</div><h4 data-i18n="steps.ex3t"></h4><p data-i18n="steps.ex3p"></p></div>
      </div>
    </div>
  </div>
</section>

<section class="section">
  <div class="wrap">
    <div class="section-head">
      <div class="eyebrow" data-i18n="testi.eyebrow"></div>
      <h2 data-i18n="testi.h2"></h2>
    </div>
    <div class="testi-grid">
      <div class="testi"><img src="https://images.pexels.com/photos/3184339/pexels-photo-3184339.jpeg?auto=compress&cs=tinysrgb&w=300" alt=""><div class="body"><p data-i18n="testi.q1"></p><div class="who" data-i18n="testi.w1"></div></div></div>
      <div class="testi"><img src="https://images.pexels.com/photos/2379005/pexels-photo-2379005.jpeg?auto=compress&cs=tinysrgb&w=300" alt=""><div class="body"><p data-i18n="testi.q2"></p><div class="who" data-i18n="testi.w2"></div></div></div>
      <div class="testi"><img src="https://images.pexels.com/photos/2381069/pexels-photo-2381069.jpeg?auto=compress&cs=tinysrgb&w=300" alt=""><div class="body"><p data-i18n="testi.q3"></p><div class="who" data-i18n="testi.w3"></div></div></div>
      <div class="testi"><img src="https://images.pexels.com/photos/1130626/pexels-photo-1130626.jpeg?auto=compress&cs=tinysrgb&w=300" alt=""><div class="body"><p data-i18n="testi.q4"></p><div class="who" data-i18n="testi.w4"></div></div></div>
    </div>
  </div>

function applyLang(lang){
  document.documentElement.lang = lang;
  document.documentElement.dataset.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const path = el.getAttribute('data-i18n').split('.');
    let val = translations[lang];
    path.forEach(p=>val = val ? val[p] : null);
    if(val) el.textContent = val;
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el=>{
    const path = el.getAttribute('data-i18n-html').split('.');
    let val = translations[lang];
    path.forEach(p=>val = val ? val[p] : null);
    if(val) el.innerHTML = val;
  });
  document.querySelectorAll('[data-lang-btn]').forEach(b=>{
    b.classList.toggle('active', b.dataset.langBtn === lang);
  });
}
document.querySelectorAll('[data-lang-btn]').forEach(btn=>{
  btn.addEventListener('click', ()=>applyLang(btn.dataset.langBtn));
});
applyLang('ru');

document.getElementById('themeToggle').addEventListener('click', ()=>{
  const html = document.documentElement;
  html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
});

document.querySelectorAll('.faq-item').forEach(item=>{
  const q = item.querySelector('.faq-q');
  const a = item.querySelector('.faq-a');
  q.addEventListener('click',()=>{
    const isOpen = item.classList.contains('open');
    document.querySelectorAll('.faq-item.open').forEach(o=>{
      o.classList.remove('open');
      o.querySelector('.faq-a').style.maxHeight = null;
    });
    if(!isOpen){
      item.classList.add('open');
      a.style.maxHeight = a.scrollHeight + 'px';
    }
  });
});
</script>
